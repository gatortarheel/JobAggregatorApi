name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish JobAggregatorApi.csproj -c Release -o ./output

      - name: Create zip
        run: |
          cd output
          zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Azure App Service
        run: |
          # 1. Disable Kudu build (since we are deploying a pre-built zip)
          # 2. Set the persistent SQLite path in /home/
          az webapp config appsettings set \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            ConnectionStrings__DefaultConnection="Data Source=/home/job-aggregator.db"

          # 3. Explicitly set the Startup Command for the Linux container
          az webapp config set \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --startup-file "dotnet JobAggregatorApi.dll"

      - name: Deploy to Azure
        run: |
          az webapp deploy \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --src-path deploy.zip \
            --type zip \
            --clean true
