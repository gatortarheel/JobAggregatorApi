name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        # Adding --runtime linux-x64 ensures we only include Linux-compatible binaries, 
        # eliminating the 'Invalid argument (22)' errors during rsync.
        run: dotnet publish JobAggregatorApi.csproj -c Release -o ./output --runtime linux-x64 --self-contained false

      - name: Create Deployment Package
        # cd into the directory first to ensure the zip root is the application root.
        # This prevents nested 'output/wwwroot' structures that cause 404s.
        run: |
          cd output
          zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Azure App Service
        run: |
          # Disable Kudu's internal build engine to use our pre-built zip.
          # Set the persistent SQLite path and the explicit Startup Command.
          az webapp config appsettings set \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false \
            ConnectionStrings__DefaultConnection="Data Source=/home/job-aggregator.db"

          az webapp config set \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --startup-file "dotnet JobAggregatorApi.dll"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'job-aggregator-app'
          package: 'deploy.zip'