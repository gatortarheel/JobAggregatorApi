name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        # -r linux-x64 prevents the creation of the problematic 'runtimes' folders
        run: dotnet publish JobAggregatorApi.csproj -c Release -o ./output -r linux-x64 --self-contained false

      - name: Zip Package
        run: |
          cd output
          zip -r ../deploy.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Clean Remote Directory
        # This deletes the broken 'backslash' files that are blocking rsync
        run: |
          az webapp ssh command \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --command "rm -rf /home/site/wwwroot/*" || true

      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ConnectionStrings__DefaultConnection="Data Source=/home/job-aggregator.db"

          az webapp config set \
            --name job-aggregator-app \
            --resource-group job-aggregator-rg \
            --startup-file "dotnet JobAggregatorApi.dll"

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'job-aggregator-app'
          package: 'deploy.zip'